<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
  <style>
    body {
      background: #ffffff;
      color: #1f2328;
      padding: 2rem 1rem;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 1rem;
    }
    .site-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .site-nav a:hover {
      text-decoration: underline;
    }
    .site-nav .title {
      font-weight: 600;
      font-size: 16px;
      color: #1f2328;
    }
    .site-nav .links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #656d76;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .listen-btn:hover {
      background: #eaeef2;
      color: #1f2328;
    }
    .listen-btn.playing {
      background: #ddf4ff;
      border-color: #54aeff;
      color: #0969da;
    }
    .page-nav {
      max-width: 980px;
      margin: 2rem auto 0;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #d0d7de;
    }
    .page-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="title"><a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a></span>
    <span class="links">
      <a href="{{ site.baseurl }}/">Latest</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </span>
  </nav>
  <article class="markdown-body" id="digestContent">
    {{ content }}
  </article>
  {% if page.layout == 'digest' %}
  <nav class="page-nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  <script>
    let currentBtn = null;
    let currentAudio = null;
    let audioManifest = null;

    // ---------------------------------------------------------------------------
    // Audio path derivation
    // ---------------------------------------------------------------------------

    function getAudioBasePath() {
      // Page URL: /orb_news/digests/YYYY/MM/DD/YYYY-MM-DD/
      // Audio dir: /orb_news/digests/YYYY/MM/DD/audio/
      const path = window.location.pathname.replace(/\/+$/, '');
      const parent = path.substring(0, path.lastIndexOf('/'));
      return parent + '/audio/';
    }

    // ---------------------------------------------------------------------------
    // Stop / play controls
    // ---------------------------------------------------------------------------

    function stopCurrent() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      speechSynthesis.cancel();
      if (currentBtn) {
        currentBtn.classList.remove('playing');
        currentBtn.textContent = '\u25B6 Listen';
        currentBtn = null;
      }
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    // ---------------------------------------------------------------------------
    // MP3 playback (pre-generated audio)
    // ---------------------------------------------------------------------------

    function playMP3(btn, url, durationHint) {
      if (btn === currentBtn) { stopCurrent(); return; }
      stopCurrent();

      const audio = new Audio(url);
      currentAudio = audio;
      currentBtn = btn;
      btn.classList.add('playing');
      btn.textContent = '\u25A0 Stop';

      audio.onended = () => stopCurrent();
      audio.onerror = () => {
        // MP3 failed to load — fall back to Web Speech API
        currentAudio = null;
        const sectionEl = btn._sectionContainer;
        if (sectionEl) handleSpeechSynthesis(btn, sectionEl);
        else stopCurrent();
      };
      audio.play();
    }

    // ---------------------------------------------------------------------------
    // Web Speech API fallback
    // ---------------------------------------------------------------------------

    function extractSectionText(sectionEl) {
      const clone = sectionEl.cloneNode(true);
      clone.querySelectorAll('.listen-btn').forEach(el => el.remove());
      clone.querySelectorAll('sup').forEach(el => el.remove());
      clone.querySelectorAll('code').forEach(el => el.remove());

      let text = clone.innerText || clone.textContent;
      text = text.replace(/Sources:[\s\S]*?(?=\n[A-Z\n#]|$)/gi, '');
      text = text.replace(/^\d+\.\s.*https?:\/\/.*$/gm, '');
      text = text.replace(/https?:\/\/\S+/g, '');
      text = text.replace(/Last updated:.*$/gm, '');
      text = text.replace(/\n{3,}/g, '\n\n').trim();
      return text;
    }

    function handleSpeechSynthesis(btn, sectionEl) {
      if (btn === currentBtn) { stopCurrent(); return; }
      stopCurrent();

      const text = extractSectionText(sectionEl);
      if (!text) return;

      const sentences = text.match(/[^.!?]*[.!?]+(?:\s|$)/g) || [text];
      const chunks = [];
      let current = '';
      for (const s of sentences) {
        if ((current + s).length > 1500 && current) {
          chunks.push(current.trim());
          current = s;
        } else {
          current += s;
        }
      }
      if (current.trim()) chunks.push(current.trim());

      currentBtn = btn;
      btn.classList.add('playing');
      btn.textContent = '\u25A0 Stop';

      let i = 0;
      function next() {
        if (i >= chunks.length || currentBtn !== btn) { stopCurrent(); return; }
        const utter = new SpeechSynthesisUtterance(chunks[i]);
        utter.rate = 1.05;
        const voices = speechSynthesis.getVoices();
        const voice = ['Samantha', 'Daniel', 'Karen', 'Moira']
          .map(n => voices.find(v => v.name.includes(n)))
          .find(Boolean) || voices.find(v => v.lang.startsWith('en') && v.localService);
        if (voice) utter.voice = voice;
        utter.onend = () => { i++; next(); };
        utter.onerror = (e) => { if (e.error === 'canceled') return; i++; next(); };
        speechSynthesis.speak(utter);
      }
      next();
    }

    // ---------------------------------------------------------------------------
    // Button injection
    // ---------------------------------------------------------------------------

    function collectSection(heading, stopTags) {
      const els = [];
      let el = heading.nextElementSibling;
      while (el) {
        if (el.classList && el.classList.contains('listen-btn')) { el = el.nextElementSibling; continue; }
        if (stopTags.includes(el.tagName)) break;
        els.push(el);
        el = el.nextElementSibling;
      }
      return els;
    }

    function addListenBtn(afterEl, contentEls, audioKey) {
      const btn = document.createElement('button');
      btn.className = 'listen-btn';

      // Store section content for fallback
      const container = document.createElement('div');
      contentEls.forEach(e => container.appendChild(e.cloneNode(true)));
      btn._sectionContainer = container;

      const sectionInfo = audioManifest && audioManifest.sections[audioKey];

      if (sectionInfo) {
        const dur = formatDuration(sectionInfo.duration_s);
        btn.textContent = `\u25B6 Listen (${dur})`;
        const mp3Url = getAudioBasePath() + sectionInfo.file;
        btn.onclick = () => playMP3(btn, mp3Url, sectionInfo.duration_s);
      } else {
        btn.textContent = '\u25B6 Listen';
        btn.onclick = () => handleSpeechSynthesis(btn, container);
      }

      afterEl.insertAdjacentElement('afterend', btn);
    }

    function injectButtons() {
      const article = document.getElementById('digestContent');
      if (!article) return;

      const h2s = article.querySelectorAll('h2');
      h2s.forEach((h2) => {
        const title = h2.textContent.trim().toLowerCase();
        if (title.includes('top stories')) {
          let el = h2.nextElementSibling;
          let storyNum = 1;
          while (el && el.tagName !== 'H2') {
            if (el.tagName === 'H3') {
              const h3Content = collectSection(el, ['H3', 'H2', 'HR']);
              addListenBtn(el, h3Content, `top-story-${storyNum}`);
              storyNum++;
            }
            el = el.nextElementSibling;
          }
        } else if (title.includes('update')) {
          const sectionEls = collectSection(h2, ['H2']);
          const key = title.includes('midday') ? 'midday-update'
            : title.includes('evening') ? 'evening-update'
            : 'manual-update';
          addListenBtn(h2, sectionEls, key);
        } else {
          const sectionEls = collectSection(h2, ['H2']);
          addListenBtn(h2, sectionEls, title);
        }
      });
    }

    // ---------------------------------------------------------------------------
    // Initialise: try to load manifest, then inject buttons
    // ---------------------------------------------------------------------------

    (async function init() {
      try {
        const resp = await fetch(getAudioBasePath() + 'manifest.json');
        if (resp.ok) audioManifest = await resp.json();
      } catch (e) {
        // No manifest — buttons will use Web Speech API fallback
      }
      injectButtons();
    })();

    // Load voices for fallback
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

    // Safari keep-alive for speech synthesis fallback
    setInterval(() => {
      if (currentBtn && !currentAudio && speechSynthesis.paused) {
        speechSynthesis.resume();
      }
    }, 5000);
  </script>
  {% endif %}
</body>
</html>
