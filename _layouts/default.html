<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
  <style>
    body {
      background: #ffffff;
      color: #1f2328;
      padding: 2rem 1rem;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 1rem;
    }
    .site-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .site-nav a:hover {
      text-decoration: underline;
    }
    .site-nav .title {
      font-weight: 600;
      font-size: 16px;
      color: #1f2328;
    }
    .site-nav .links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #656d76;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .listen-btn:hover {
      background: #eaeef2;
      color: #1f2328;
    }
    .listen-btn.playing {
      background: #ddf4ff;
      border-color: #54aeff;
      color: #0969da;
    }
    .page-nav {
      max-width: 980px;
      margin: 2rem auto 0;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #d0d7de;
    }
    .page-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="title"><a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a></span>
    <span class="links">
      <a href="{{ site.baseurl }}/">Latest</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </span>
  </nav>
  <article class="markdown-body" id="digestContent">
    {{ content }}
  </article>
  {% if page.layout == 'digest' %}
  <nav class="page-nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  <script>
    let currentBtn = null;

    function extractSectionText(sectionEl) {
      const clone = sectionEl.cloneNode(true);

      // Remove listen buttons
      clone.querySelectorAll('.listen-btn').forEach(el => el.remove());
      // Remove superscript references
      clone.querySelectorAll('sup').forEach(el => el.remove());
      // Remove code tags (topic tags)
      clone.querySelectorAll('code').forEach(el => el.remove());

      let text = clone.innerText || clone.textContent;

      // Remove sources blocks
      text = text.replace(/Sources:[\s\S]*?(?=\n[A-Z\n#]|$)/gi, '');
      // Remove numbered source lines
      text = text.replace(/^\d+\.\s.*https?:\/\/.*$/gm, '');
      // Remove bare URLs
      text = text.replace(/https?:\/\/\S+/g, '');
      // Remove "Last updated" line
      text = text.replace(/Last updated:.*$/gm, '');
      // Clean whitespace
      text = text.replace(/\n{3,}/g, '\n\n').trim();

      return text;
    }

    function stopCurrent() {
      speechSynthesis.cancel();
      if (currentBtn) {
        currentBtn.classList.remove('playing');
        currentBtn.textContent = '\u25B6 Listen';
        currentBtn = null;
      }
    }

    function handleListen(btn, sectionEl) {
      // If this button is already playing, stop it
      if (btn === currentBtn) {
        stopCurrent();
        return;
      }

      // Stop any other playing section
      stopCurrent();

      const text = extractSectionText(sectionEl);
      if (!text) return;

      // Split into smaller chunks for reliability
      const chunks = text.match(/[\s\S]{1,2000}(?:\s|$)/g) || [text];

      currentBtn = btn;
      btn.classList.add('playing');
      btn.textContent = '\u25A0 Stop';

      let i = 0;

      function next() {
        if (i >= chunks.length || currentBtn !== btn) {
          stopCurrent();
          return;
        }

        const utter = new SpeechSynthesisUtterance(chunks[i]);
        utter.rate = 1.05;

        // Pick a good voice
        const voices = speechSynthesis.getVoices();
        const voice = ['Samantha', 'Daniel', 'Karen', 'Moira']
          .map(n => voices.find(v => v.name.includes(n)))
          .find(Boolean) || voices.find(v => v.lang.startsWith('en') && v.localService);
        if (voice) utter.voice = voice;

        utter.onend = () => { i++; next(); };
        utter.onerror = (e) => {
          if (e.error === 'canceled') return;
          i++; next();
        };

        speechSynthesis.speak(utter);
      }

      next();
    }

    // Find all h2 sections and insert listen buttons
    (function injectButtons() {
      const article = document.getElementById('digestContent');
      if (!article) return;

      const h2s = article.querySelectorAll('h2');

      h2s.forEach((h2) => {
        // Collect all elements belonging to this section (until next h2 or hr)
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'listen-section';

        // Gather sibling elements until the next h2 or end
        let el = h2.nextElementSibling;
        const sectionEls = [h2];
        while (el && el.tagName !== 'H2') {
          sectionEls.push(el);
          el = el.nextElementSibling;
        }

        // Create a wrapper we can reference for text extraction
        const wrapper = document.createElement('div');
        wrapper.dataset.section = h2.textContent.trim();

        // Move elements into wrapper (without actually moving DOM — just reference)
        // Instead, we'll just pass the elements to the handler
        // Insert button after the h2
        const btn = document.createElement('button');
        btn.className = 'listen-btn';
        btn.textContent = '\u25B6 Listen';
        btn.onclick = function() {
          // Create a temp container with all section content for text extraction
          const container = document.createElement('div');
          sectionEls.forEach(e => container.appendChild(e.cloneNode(true)));
          handleListen(btn, container);
        };

        // Insert button right after the h2
        if (h2.nextSibling) {
          h2.parentNode.insertBefore(btn, h2.nextSibling);
        } else {
          h2.parentNode.appendChild(btn);
        }
      });
    })();

    // Load voices
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

    // Safari keep-alive
    setInterval(() => {
      if (currentBtn && speechSynthesis.paused) {
        speechSynthesis.resume();
      }
    }, 5000);
  </script>
  {% endif %}
</body>
</html>
