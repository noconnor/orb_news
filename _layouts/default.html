<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
  <style>
    body {
      background: #ffffff;
      color: #1f2328;
      padding: 2rem 1rem;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 1rem;
    }
    .site-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .site-nav a:hover {
      text-decoration: underline;
    }
    .site-nav .title {
      font-weight: 600;
      font-size: 16px;
      color: #1f2328;
    }
    .site-nav .links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1f2328;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }
    .listen-btn:hover {
      background: #eaeef2;
    }
    .listen-btn.playing {
      background: #ddf4ff;
      border-color: #54aeff;
      color: #0969da;
    }
    .listen-progress {
      display: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #656d76;
      margin-left: 0.5rem;
    }
    .listen-progress.visible {
      display: inline;
    }
    .page-nav {
      max-width: 980px;
      margin: 2rem auto 0;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #d0d7de;
    }
    .page-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="title"><a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a></span>
    <span class="links">
      {% if page.layout == 'digest' %}
      <button class="listen-btn" id="listenBtn" onclick="toggleListen()">
        <span id="listenIcon">&#9654;</span>
        <span id="listenLabel">Listen</span>
      </button>
      <span class="listen-progress" id="listenProgress"></span>
      {% endif %}
      <a href="{{ site.baseurl }}/">Latest</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </span>
  </nav>
  <article class="markdown-body" id="digestContent">
    {{ content }}
  </article>
  {% if page.layout == 'digest' %}
  <nav class="page-nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  <script>
    let speaking = false;
    let chunks = [];
    let currentChunk = 0;
    let cancelRequested = false;

    function getCleanText() {
      const content = document.getElementById('digestContent').cloneNode(true);

      // Remove superscript reference links
      content.querySelectorAll('sup').forEach(el => el.remove());

      // Remove inline code tags (topic tags)
      content.querySelectorAll('code').forEach(el => el.remove());

      // Get the text
      let text = content.innerText || content.textContent;

      // Remove "Sources:" blocks and everything until next section header or horizontal rule
      // Pattern: "Sources:" followed by numbered list items until a blank line + heading
      text = text.replace(/Sources:\s*\n([\s\S]*?)(?=\n[A-Z#\-]|\n\n[A-Z]|$)/gi, '');

      // Remove any remaining numbered source lines (1. [Source...], 2. [Source...])
      text = text.replace(/^\d+\.\s*\[?[A-Z].*https?:\/\/.*$/gm, '');

      // Remove "Last updated:" metadata line
      text = text.replace(/Last updated:.*$/gm, '');

      // Remove standalone URLs
      text = text.replace(/https?:\/\/\S+/g, '');

      // Remove tag lines (lines that are just backtick words)
      text = text.replace(/^[`\s]+.*[`\s]+$/gm, '');

      // Clean up excessive whitespace
      text = text.replace(/\n{3,}/g, '\n\n').trim();

      return text;
    }

    function splitIntoChunks(text, maxLen) {
      const paragraphs = text.split(/\n\n+/);
      const result = [];
      let current = '';

      for (const para of paragraphs) {
        if ((current + '\n\n' + para).length > maxLen && current) {
          result.push(current.trim());
          current = para;
        } else {
          current = current ? current + '\n\n' + para : para;
        }
      }
      if (current.trim()) {
        result.push(current.trim());
      }
      return result;
    }

    function getPreferredVoice() {
      const voices = speechSynthesis.getVoices();
      // Prefer high-quality macOS/iOS voices
      const prefs = ['Samantha', 'Daniel', 'Karen', 'Moira', 'Fiona'];
      for (const name of prefs) {
        const v = voices.find(v => v.name.includes(name));
        if (v) return v;
      }
      // Fallback: any local English voice
      return voices.find(v => v.lang.startsWith('en') && v.localService) || null;
    }

    function updateProgress() {
      const progress = document.getElementById('listenProgress');
      if (chunks.length > 1) {
        progress.textContent = `(${currentChunk + 1}/${chunks.length})`;
        progress.classList.add('visible');
      }
    }

    function speakNext() {
      if (cancelRequested || currentChunk >= chunks.length) {
        stopListen();
        return;
      }

      const utter = new SpeechSynthesisUtterance(chunks[currentChunk]);
      utter.rate = 1.05;
      utter.pitch = 1.0;

      const voice = getPreferredVoice();
      if (voice) utter.voice = voice;

      utter.onend = () => {
        if (cancelRequested) { stopListen(); return; }
        currentChunk++;
        updateProgress();
        speakNext();
      };

      utter.onerror = () => {
        if (cancelRequested) { stopListen(); return; }
        currentChunk++;
        updateProgress();
        speakNext();
      };

      speechSynthesis.speak(utter);
      updateProgress();
    }

    function toggleListen() {
      if (speaking) {
        stopListen();
      } else {
        startListen();
      }
    }

    function startListen() {
      // Force cancel any lingering speech
      cancelRequested = false;
      speechSynthesis.cancel();

      const text = getCleanText();
      chunks = splitIntoChunks(text, 3000);
      currentChunk = 0;
      speaking = true;

      const btn = document.getElementById('listenBtn');
      const icon = document.getElementById('listenIcon');
      const label = document.getElementById('listenLabel');
      btn.classList.add('playing');
      icon.textContent = '\u25A0';
      label.textContent = 'Stop';

      // Small delay to let cancel() finish
      setTimeout(speakNext, 100);
    }

    function stopListen() {
      cancelRequested = true;
      // Call cancel repeatedly — workaround for Safari/Chrome bug
      speechSynthesis.cancel();
      setTimeout(() => speechSynthesis.cancel(), 50);
      setTimeout(() => speechSynthesis.cancel(), 150);

      speaking = false;
      currentChunk = 0;
      cancelRequested = false;

      const btn = document.getElementById('listenBtn');
      const icon = document.getElementById('listenIcon');
      const label = document.getElementById('listenLabel');
      const progress = document.getElementById('listenProgress');
      btn.classList.remove('playing');
      icon.textContent = '\u25B6';
      label.textContent = 'Listen';
      progress.classList.remove('visible');
    }

    // Load voices (some browsers fire this async)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

    // Safari workaround: speech sometimes pauses after ~15s
    // Keep-alive by resuming periodically while speaking
    setInterval(() => {
      if (speaking && speechSynthesis.paused) {
        speechSynthesis.resume();
      }
    }, 5000);
  </script>
  {% endif %}
</body>
</html>
