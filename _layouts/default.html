<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #fafaf9;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2563eb;
      --border: #e5e5e5;
      --block-bg: #f5f5f4;
      --max-w: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181b;
        --fg: #e4e4e7;
        --muted: #a1a1aa;
        --accent: #60a5fa;
        --border: #3f3f46;
        --block-bg: #27272a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.7;
      color: var(--fg);
      background: var(--bg);
      padding: 2rem 1rem;
    }
    .site-header {
      max-width: var(--max-w);
      margin: 0 auto 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--fg);
    }
    .site-header h1 {
      font-size: 2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .site-header h1 a {
      color: var(--fg);
      text-decoration: none;
    }
    .site-header p {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .content {
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .content h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .content h2 {
      font-size: 1.4rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .content h3 {
      font-size: 1.15rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .content p {
      margin-bottom: 1rem;
    }
    .content a {
      color: var(--accent);
      text-decoration: none;
    }
    .content a:hover {
      text-decoration: underline;
    }
    .content blockquote {
      border-left: 3px solid var(--accent);
      background: var(--block-bg);
      padding: 1rem 1.25rem;
      margin: 1.25rem 0;
      font-size: 0.92rem;
    }
    .content blockquote p {
      margin-bottom: 0.5rem;
    }
    .content blockquote p:last-child {
      margin-bottom: 0;
    }
    .content code {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 0.8rem;
      background: var(--block-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }
    .content strong {
      font-weight: 700;
    }
    .content em {
      font-style: italic;
    }
    .meta {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .nav {
      max-width: var(--max-w);
      margin: 0 auto;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
    }
    .nav a {
      color: var(--accent);
      text-decoration: none;
    }
    .nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
  </header>
  <main class="content">
    {{ content }}
  </main>
  {% if page.layout == 'digest' %}
  <nav class="nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    <a href="{{ site.baseurl }}/archive">Archive</a>
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  {% endif %}
</body>
</html>
