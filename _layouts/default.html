<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
  <style>
    body {
      background: #ffffff;
      color: #1f2328;
      padding: 2rem 1rem;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .markdown-body h1:first-of-type {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 1rem;
    }
    .site-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .site-nav a:hover {
      text-decoration: underline;
    }
    .site-nav .title {
      font-weight: 600;
      font-size: 16px;
      color: #1f2328;
    }
    .site-nav .links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1f2328;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      vertical-align: middle;
      line-height: 1;
    }
    .listen-btn:hover {
      background: #eaeef2;
    }
    .listen-btn.playing {
      background: #ddf4ff;
      border-color: #54aeff;
      color: #0969da;
    }
    .listen-progress {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 11px;
      color: #656d76;
      vertical-align: middle;
    }
    .page-nav {
      max-width: 980px;
      margin: 2rem auto 0;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #d0d7de;
    }
    .page-nav a {
      color: #0969da;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="title"><a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a></span>
    <span class="links">
      <a href="{{ site.baseurl }}/">Latest</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </span>
  </nav>
  <article class="markdown-body" id="digestContent">
    {{ content }}
  </article>
  {% if page.layout == 'digest' %}
  <nav class="page-nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  <script>
    // State
    let isPlaying = false;
    let chunks = [];
    let currentChunk = 0;
    let activeUtterance = null;

    // Inject listen button next to the h1 title
    (function injectButton() {
      const h1 = document.querySelector('#digestContent h1');
      if (!h1) return;

      const btn = document.createElement('button');
      btn.className = 'listen-btn';
      btn.id = 'listenBtn';
      btn.innerHTML = '<span id="listenIcon">&#9654;</span> <span id="listenLabel">Listen</span>';
      btn.onclick = toggleListen;
      h1.appendChild(btn);

      const prog = document.createElement('span');
      prog.className = 'listen-progress';
      prog.id = 'listenProgress';
      h1.appendChild(prog);
    })();

    function getCleanText() {
      const content = document.getElementById('digestContent').cloneNode(true);

      // Remove superscript reference links
      content.querySelectorAll('sup').forEach(el => el.remove());

      // Remove inline code tags (topic tags)
      content.querySelectorAll('code').forEach(el => el.remove());

      // Get text
      let text = content.innerText || content.textContent;

      // Remove "Sources:" blocks and numbered source lists
      text = text.replace(/Sources:\s*\n[\s\S]*?(?=\n[A-Z#\u2014]|\n\n[A-Z]|\n---|\n##|$)/gi, '');
      text = text.replace(/^\d+\.\s*\[?[A-Z].*https?:\/\/.*$/gm, '');
      text = text.replace(/Last updated:.*$/gm, '');
      text = text.replace(/https?:\/\/\S+/g, '');
      text = text.replace(/^[`\s]+.*[`\s]+$/gm, '');
      text = text.replace(/\n{3,}/g, '\n\n').trim();

      return text;
    }

    function splitIntoChunks(text, maxLen) {
      const paragraphs = text.split(/\n\n+/);
      const result = [];
      let current = '';
      for (const para of paragraphs) {
        if ((current + '\n\n' + para).length > maxLen && current) {
          result.push(current.trim());
          current = para;
        } else {
          current = current ? current + '\n\n' + para : para;
        }
      }
      if (current.trim()) result.push(current.trim());
      return result;
    }

    function getVoice() {
      const voices = speechSynthesis.getVoices();
      const prefs = ['Samantha', 'Daniel', 'Karen', 'Moira'];
      for (const name of prefs) {
        const v = voices.find(v => v.name.includes(name));
        if (v) return v;
      }
      return voices.find(v => v.lang.startsWith('en') && v.localService) || null;
    }

    function updateUI() {
      const btn = document.getElementById('listenBtn');
      const icon = document.getElementById('listenIcon');
      const label = document.getElementById('listenLabel');
      const progress = document.getElementById('listenProgress');
      if (!btn) return;

      if (isPlaying) {
        btn.classList.add('playing');
        icon.textContent = '\u25A0';
        label.textContent = 'Stop';
        progress.textContent = chunks.length > 1 ? `(${currentChunk + 1}/${chunks.length})` : '';
      } else {
        btn.classList.remove('playing');
        icon.textContent = '\u25B6';
        label.textContent = 'Listen';
        progress.textContent = '';
      }
    }

    function speakChunk(index) {
      if (!isPlaying || index >= chunks.length) {
        isPlaying = false;
        currentChunk = 0;
        updateUI();
        return;
      }

      currentChunk = index;
      updateUI();

      const utter = new SpeechSynthesisUtterance(chunks[index]);
      utter.rate = 1.05;
      utter.pitch = 1.0;
      const voice = getVoice();
      if (voice) utter.voice = voice;

      activeUtterance = utter;

      utter.onend = () => {
        if (!isPlaying) return;
        speakChunk(index + 1);
      };

      utter.onerror = (e) => {
        // 'canceled' is expected when we call stop
        if (e.error === 'canceled') return;
        if (!isPlaying) return;
        speakChunk(index + 1);
      };

      speechSynthesis.speak(utter);
    }

    function toggleListen() {
      if (isPlaying) {
        doStop();
      } else {
        doStart();
      }
    }

    function doStart() {
      // Prepare text
      const text = getCleanText();
      if (!text) return;

      chunks = splitIntoChunks(text, 3000);
      currentChunk = 0;
      isPlaying = true;
      updateUI();

      // Start speaking after a tick
      setTimeout(() => speakChunk(0), 50);
    }

    function doStop() {
      isPlaying = false;
      activeUtterance = null;
      speechSynthesis.cancel();
      currentChunk = 0;
      updateUI();
    }

    // Load voices
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

    // Safari workaround: resume if paused
    setInterval(() => {
      if (isPlaying && speechSynthesis.paused) {
        speechSynthesis.resume();
      }
    }, 5000);
  </script>
  {% endif %}
</body>
</html>
