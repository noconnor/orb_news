<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css" media="(prefers-color-scheme: light)">
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem 1rem;
    }
    @media (prefers-color-scheme: light) {
      body { background: #ffffff; color: #1f2328; }
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
      margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: light) {
      .site-nav { border-bottom-color: #d0d7de; }
    }
    .site-nav a {
      color: #58a6ff;
      text-decoration: none;
    }
    .site-nav a:hover {
      text-decoration: underline;
    }
    @media (prefers-color-scheme: light) {
      .site-nav a { color: #0969da; }
    }
    .site-nav .title {
      font-weight: 600;
      font-size: 16px;
      color: #e6edf3;
    }
    @media (prefers-color-scheme: light) {
      .site-nav .title { color: #1f2328; }
    }
    .site-nav .links {
      display: flex;
      gap: 1.5rem;
    }
    .page-nav {
      max-width: 980px;
      margin: 2rem auto 0;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #30363d;
    }
    @media (prefers-color-scheme: light) {
      .page-nav { border-top-color: #d0d7de; }
    }
    .page-nav a {
      color: #58a6ff;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
    @media (prefers-color-scheme: light) {
      .page-nav a { color: #0969da; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="title"><a href="{{ site.baseurl }}/" style="color: inherit;">{{ site.title }}</a></span>
    <span class="links">
      <a href="{{ site.baseurl }}/">Latest</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </span>
  </nav>
  <article class="markdown-body">
    {{ content }}
  </article>
  {% if page.layout == 'digest' %}
  <nav class="page-nav">
    {% if page.previous_digest %}<a href="{{ page.previous_digest }}">&larr; Previous</a>{% else %}<span></span>{% endif %}
    {% if page.next_digest %}<a href="{{ page.next_digest }}">Next &rarr;</a>{% else %}<span></span>{% endif %}
  </nav>
  {% endif %}
</body>
</html>
